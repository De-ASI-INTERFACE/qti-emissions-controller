name: CI — Anchor Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Anchor Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (pinned)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install Solana CLI (1.18.x)
        run: |
          sh -c "$(curl -sSfL https://release.solana.com/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI (0.30.1)
        run: |
          npm install -g @coral-xyz/anchor-cli@0.30.1

      - name: Install Node dependencies
        run: npm ci

      - name: Rust fmt check
        run: cargo fmt --all -- --check

      - name: Clippy lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Anchor build
        run: anchor build

      - name: Anchor test (localnet)
        run: anchor test --skip-local-validator

      - name: Verify program binary checksum
        run: |
          echo "Program ID: EMiSCtRL1QTIDeASIInterface111111111111111111"
          sha256sum target/deploy/qti_emissions_controller.so
